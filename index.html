    function calcTDEE(pr){
      const bmr=pr.sex==="M"?10*pr.weight+6.25*pr.height-5*pr.age+5:10*pr.weight+6.25*pr.height-5*pr.age-161;
      const act=ACTIVITY.find(a=>a.id===pr.activity)?.mult||1.55;
      const adj=GOALS.find(g=>g.id===pr.goal)?.adjust||1;
      const tdee=Math.round(bmr*act*adj);
      const protein=Math.round(pr.weight*(pr.goal==="cut"?2.4:pr.goal==="bulk"?2.2:2));
      const fat=Math.round((tdee*0.25)/9);
      const carbs=Math.round((tdee-protein*4-fat*9)/4);
      return{tdee,protein,carbs,fat};
    }

              <circle cx="70" cy="70" r={r} fill="none" stroke={color} strokeWidth="10" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.5s ease"}}/>

    function BarcodeScanner({onResult,onClose}){
      const videoRef=useRef();
      const [manualCode,setManualCode]=useState("");
      const [loading,setLoading]=useState(false);
      const [error,setError]=useState("");
      const [cameraActive,setCameraActive]=useState(false);
      const streamRef=useRef();
      const detectorRef=useRef();
      const fetchProduct=async(barcode)=>{
        setLoading(true);setError("");
        try{
          const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
          const data=await res.json();
          if(data.status===1&&data.product){
            const p=data.product,n=p.nutriments||{};
            onResult({name:p.product_name||p.product_name_fr||"Produit scanné",brand:p.brands||"",cat:"Scanné",emoji:"📦",p100:{cal:Math.round(n["energy-kcal_100g"]||0),p:Math.round((n.proteins_100g||0)*10)/10,c:Math.round((n.carbohydrates_100g||0)*10)/10,f:Math.round((n.fat_100g||0)*10)/10,fiber:Math.round((n.fiber_100g||0)*10)/10,sugar:Math.round((n.sugars_100g||0)*10)/10,sodium:Math.round((n.sodium_100g||0)*1000),calcium:Math.round(n.calcium_100g||0),iron:Math.round((n.iron_100g||0)*10)/10,vitC:Math.round((n["vitamin-c_100g"]||0)*1000*10)/10,vitD:Math.round((n["vitamin-d_100g"]||0)*1000000*10)/10,vitE:0,vitK:0,vitA:0,vitB12:0,magnesium:Math.round(n.magnesium_100g||0),potassium:Math.round(n.potassium_100g||0),zinc:Math.round((n.zinc_100g||0)*10)/10,selenium:0,omega3:0,folates:0,phosphorus:Math.round(n.phosphorus_100g||0)},image:p.image_small_url||null,barcode});
          } else setError("Produit non trouvé dans Open Food Facts. Essaie un autre code-barres.");
        }catch(e){setError("Connexion bloquée (restriction réseau du sandbox). Saisis les infos manuellement via la base de données.");}
        setLoading(false);
      };
      const startCamera=async()=>{
        try{
          const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
          streamRef.current=stream;
          if(videoRef.current)videoRef.current.srcObject=stream;
          setCameraActive(true);
          if("BarcodeDetector" in window){
            detectorRef.current=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});
            const scan=async()=>{if(!videoRef.current||!detectorRef.current)return;try{const b=await detectorRef.current.detect(videoRef.current);if(b.length>0){stopCamera();fetchProduct(b[0].rawValue);return;}}catch(e){}requestAnimationFrame(scan);};
            videoRef.current.onloadedmetadata=()=>scan();
          }
        }catch(e){setError("Impossible d'accéder à la caméra. Utilise la saisie manuelle.");}
      };
      const stopCamera=()=>{if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());setCameraActive(false);};
      useEffect(()=>()=>{stopCamera();},[]);
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.94)",zIndex:8888,display:"flex",flexDirection:"column",padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

            <button onClick={()=>{stopCamera();onClose();}} style={{background:"#1e1e2e",border:"1px solid #333",borderRadius:9,color:"#fff",padding:"6px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:12}}>✕ Fermer</button>
          </div>
          <div style={{background:"#0a0a0a",borderRadius:14,overflow:"hidden",marginBottom:12,border:"2px solid #2a2a4e",position:"relative",height:210}}>
            {cameraActive?(<><video ref={videoRef} autoPlay playsInline style={{width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{width:190,height:90,border:"2px solid #8b5cf6",borderRadius:8,boxShadow:"0 0 0 2000px rgba(0,0,0,0.45)"}}/></div><div style={{position:"absolute",bottom:7,left:0,right:0,textAlign:"center",color:"#8b5cf6",fontSize:10,fontFamily:"'DM Sans',sans-serif"}}>{"BarcodeDetector" in window?"Scan automatique actif ●":"Saisir le code manuellement"}</div></>):(<div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}><div style={{fontSize:36}}>📦</div><div style={{color:"#555",fontSize:11,fontFamily:"'DM Sans',sans-serif",textAlign:"center"}}>Open Food Facts · 3M+ produits</div></div>)}
          </div>
          <button onClick={cameraActive?stopCamera:startCamera} style={{...SC.btn,width:"100%",background:cameraActive?"#ef4444":"linear-gradient(135deg,#7c3aed,#a855f7)",color:"#fff",fontWeight:700,marginBottom:10}}>{cameraActive?"⏹ Arrêter la caméra":"📷 Activer la caméra"}</button>
          <div style={{...SC.card,padding:"11px"}}>
            <div style={{color:"#666",fontSize:10,fontFamily:"'DM Sans',sans-serif",letterSpacing:0.5,marginBottom:7}}>OU SAISIR LE CODE-BARRES MANUELLEMENT</div>
            <div style={{display:"flex",gap:7}}>
              <input type="text" inputMode="numeric" placeholder="ex: 3017620422003" value={manualCode} onChange={e=>setManualCode(e.target.value.replace(/\D/g,""))} style={{...SC.input,marginBottom:0,flex:1,fontSize:13,letterSpacing:1}}/>

            </div>
          </div>
          {loading&&<div style={{textAlign:"center",color:"#8b5cf6",fontSize:12,fontFamily:"'DM Sans',sans-serif",marginTop:10}}>🔍 Recherche dans Open Food Facts...</div>}
          {error&&<div style={{background:"#2a0f0f",border:"1px solid #ef4444",borderRadius:11,padding:"9px 13px",color:"#ef4444",fontSize:11,fontFamily:"'DM Sans',sans-serif",marginTop:10}}>{error}</div>}
        </div>
      );
    }

        );
      };
    
      const TABS=[{id:"dashboard",icon:"🏠",label:"Accueil"},{id:"nutrition",icon:"🥗",label:"Nutrition"},{id:"workout",icon:"💪",label:"Séance"},{id:"recipes",icon:"🍽️",label:"Recettes"},{id:"account",icon:"👤",label:"Compte"}];
    
      return(
        <div style={SC.app}>
          <style>{CSS}</style>
          {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
          {showScanner&&<BarcodeScanner onResult={p=>{setScannedProduct(p);setShowScanner(false);setAddTab("scan");setAddingFood(true);}} onClose={()=>setShowScanner(false)}/>}
          <div style={{maxWidth:500,width:"100%",margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"7px 12px 5px",borderBottom:"1px solid #1a1a2e",background:"#0a0a0a",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:"#fff",letterSpacing:3}}>TRACKLETICS</div>
              <div style={{width:3,height:3,borderRadius:"50%",background:"#8b5cf6"}}/>
              <div style={{fontSize:9,color:"#555",fontFamily:"'DM Sans',sans-serif"}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
            </div>
            <div style={{flex:1,overflowY:"auto",background:"#0a0a0a"}}>
              {tab==="dashboard"&&renderDash()}
              {tab==="nutrition"&&renderNutrition()}
              {tab==="workout"&&renderWorkout()}
              {tab==="recipes"&&renderRecipes()}
              {tab==="account"&&renderAccount()}
            </div>
            <div style={{display:"flex",background:"#0d0d0d",borderTop:"1px solid #1a1a2e",flexShrink:0}}>
              {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"7px 1px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:`2px solid ${tab===t.id?"#8b5cf6":"transparent"}`,transition:"border-color 0.2s"}}><span style={{fontSize:15}}>{t.icon}</span><span style={{fontSize:6.5,color:tab===t.id?"#8b5cf6":"#444",fontFamily:"'DM Sans',sans-serif",fontWeight:600,letterSpacing:0.2}}>{t.label.toUpperCase()}</span></button>)}
            </div>
          </div>
        </div>
      );
    }
    
    const SC={app:{background:"#0a0a0a",minHeight:"100vh",color:"#fff"},stepWrap:{display:"flex",flexDirection:"column",gap:5},tab:{padding:"11px 11px 22px"},h2:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#fff",letterSpacing:2,marginBottom:3},h3:{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:"#ccc",letterSpacing:1},p:{color:"#666",fontSize:12,fontFamily:"'DM Sans',sans-serif",marginBottom:8},card:{background:"#111",border:"1px solid #1e1e2e",borderRadius:12,padding:"11px",marginBottom:8},btn:{border:"none",borderRadius:8,padding:"9px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:600,transition:"all 0.15s",letterSpacing:0.3},input:{background:"#1a1a2e",border:"1px solid #2a2a4e",borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:12,width:"100%",marginBottom:5,fontFamily:"'DM Sans',sans-serif"}};
    const CSS=`@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');*{box-sizing:border-box;margin:0;padding:0}input[type=range]{height:4px;border-radius:4px;background:#2a2a2a}::-webkit-scrollbar{width:4px;background:#0a0a0a}::-webkit-scrollbar-thumb{background:#333;border-radius:4px}input:focus,select:focus,textarea:focus{outline:2px solid #8b5cf633!important;border-color:#8b5cf6!important}button:active{transform:scale(0.97)}select option{background:#1a1a2e;color:#fff}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}`;
    

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Trackletics />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'trackletics-v1';
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.add(location.href))));
        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
  </script>
</body>
</html>
